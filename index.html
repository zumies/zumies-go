<!doctype html><html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ズミガレ｜完全版まとめ</title>
<style>
 :root{--bg:#0b0d10;--card:#15181d;--tx:#f3f6fa;--sub:#9aa4ad;--gold:#ffcf3f;--red:#e53030}
 *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--tx);
   font-family:-apple-system,'Hiragino Kaku Gothic ProN',sans-serif}
 header{padding:22px 18px 10px;text-align:center}
 .k{color:var(--gold);font-weight:800;letter-spacing:.05em;font-size:14px}
 h1{font-size:20px;margin:6px 0 2px} .lead{color:var(--sub);font-size:13px;margin:0}
 .ch{display:block;max-width:520px;margin:14px auto 6px;background:var(--red);color:#fff;
   text-decoration:none;font-weight:800;text-align:center;padding:13px;border-radius:12px}
 main{max-width:560px;margin:0 auto;padding:8px 12px 40px}
 a.item{display:flex;gap:12px;align-items:center;background:var(--card);border-radius:12px;
   padding:10px;margin:10px 0;text-decoration:none;color:var(--tx)}
 a.item:active{opacity:.7}
 .th{position:relative;flex:0 0 132px} .th img{width:132px;height:74px;object-fit:cover;border-radius:8px;display:block}
 .pl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
 .pl span{width:34px;height:34px;background:rgba(229,48,48,.92);border-radius:50%;
   display:flex;align-items:center;justify-content:center}
 .pl span::after{content:"";border-left:11px solid #fff;border-top:7px solid transparent;border-bottom:7px solid transparent;margin-left:3px}
 .ti{font-size:14px;line-height:1.4;font-weight:600}
 a.hero{display:block;background:var(--card);border:1px solid var(--gold);border-radius:14px;
   overflow:hidden;margin:10px 0 4px;text-decoration:none;color:var(--tx)}
 a.hero img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}
 a.hero .hb{padding:12px 14px} .hero .badge{color:#1a1206;background:var(--gold);font-weight:800;
   font-size:11px;padding:2px 8px;border-radius:20px} .hero .ht{font-size:16px;font-weight:800;margin:8px 0 0;line-height:1.4}
 footer{color:var(--sub);text-align:center;font-size:12px;padding:8px 0 30px}
</style></head><body>
<header>
 <div class="k">ズミガレ・完全版まとめ</div>
 <h1>観たショートの"完全版"はこちら</h1>
 <p class="lead">気になった回のフル解説（YouTube）をどうぞ</p>
 <a class="ch" href="https://www.youtube.com/@zumies_garage">▶ チャンネルを見る（新着・ショートも）</a>
</header>
<main id="list">読み込み中…</main>
<footer>@zumies_garage ・ 日本の名車・名機を毎日1本</footer>
<script>
fetch('videos.json?_='+Date.now()).then(r=>r.json()).then(vs=>{
 const m=document.getElementById('list');
 const esc=s=>s.replace(/</g,'&lt;');
 const hero=vs.find(v=>v.featured);
 const rest=vs.filter(v=>!v.featured);
 let html='';
 if(hero){html+=`<a class="hero" href="https://youtu.be/${hero.id}">
   <img loading="lazy" src="https://img.youtube.com/vi/${hero.id}/hqdefault.jpg" alt="">
   <div class="hb"><span class="badge">🔥 いま話題の完全版</span><p class="ht">${esc(hero.title)}</p></div></a>`;}
 html+=rest.map(v=>`<a class="item" href="https://youtu.be/${v.id}">
   <div class="th"><img loading="lazy" src="https://img.youtube.com/vi/${v.id}/hqdefault.jpg" alt="">
   <span class="pl"><span></span></span></div>
   <div class="ti">${esc(v.title)}</div></a>`).join('');
 m.innerHTML=html;
}).catch(e=>{document.getElementById('list').innerHTML='<p style="color:#9aa4ad">一覧を読み込めませんでした。<a style="color:#8fb7d6" href="https://www.youtube.com/@zumies_garage">チャンネルへ</a></p>';});
</script>
</body></html>
